# Server Configuration
server.port=${PORT:8080}

# Database Configuration (Defaults to local H2 in-memory, overrides with environment variables for PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:studybuddy;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=KEYWORD}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging and local development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Properties (JWT Secret must be at least 256 bits, base64-encoded)
security.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
security.jwt.expiration-ms=86400000

# Gemini API Integration properties
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent
